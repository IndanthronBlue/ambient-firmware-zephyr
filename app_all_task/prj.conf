# Application feature switches
CONFIG_APP_STATUS_LED=y
CONFIG_APP_LOW_POWER_FSM=y
CONFIG_APP_DEEP_SLEEP_ENABLE=y
CONFIG_APP_RETENTION_ENABLE=y
CONFIG_APP_DEEP_SLEEP_SIMULATE=n
CONFIG_APP_MICROPHONE_DEBUG_SKIP_GPS_LORA=n

# Application timing, audio, and inference parameters
CONFIG_APP_INFERENCE_LABEL_CNT=11
CONFIG_APP_INFERENCE_LABELS_FILE="config/inference_labels.txt"
CONFIG_APP_INFERENCE_USE_INT16_QUANT_MODEL=y
CONFIG_APP_MIC_MICPGA_GAIN_DB=12
CONFIG_APP_LORAWAN_UPLINK_INTERVAL_MS=1800000
CONFIG_APP_SUSPEND_TO_ACTIVE_PERIOD_MS=30000
CONFIG_APP_GPS_UPLINK_WAIT_TIMEOUT_MS=60000
CONFIG_APP_DEEP_SLEEP_WAKE_SEC=10800
CONFIG_APP_LORAWAN_APP_KEY_HEX="603F3636A03926ABE7521ABE84049BE2"

# Wakeup sources
CONFIG_APP_WAKEUP_SRC_BUTTON=y
CONFIG_APP_WAKEUP_SRC_PERIODIC=y
CONFIG_APP_WAKEUP_SRC_COMM=y
CONFIG_APP_WAKEUP_SRC_RTC_ALARM=y
CONFIG_APP_WAKEUP_SRC_SOUND=y
CONFIG_APP_WAKEUP_SRC_LOW_BAT=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
# CONFIG_LOG_MODE_MINIMAL is not set
# CONFIG_LOG_MODE_IMMEDIATE is not set
CONFIG_LOG_PRINTK=n
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=1000
CONFIG_PM_LOG_LEVEL_DBG=y

# Console and serial
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Kernel stacks, heap, and diagnostics
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=512
CONFIG_ISR_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_ASSERT=n
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=n
CONFIG_THREAD_NAME=n

# C library, printf, and size options
CONFIG_PICOLIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_CBPRINTF_REDUCED_INTEGRAL=y
CONFIG_SIZE_OPTIMIZATIONS=y
# CONFIG_LTO is not set

# GPIO, ADC, I2C, and regulators
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_ADC_STM32=y
CONFIG_I2C=y
CONFIG_I2C_STM32_BUS_RECOVERY=y
CONFIG_I2C_STM32_V2_TIMING=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# Sensors
CONFIG_SENSOR=y
CONFIG_BME280=y
CONFIG_INA3221=y
CONFIG_VOLTAGE_DIVIDER=n

# Audio capture and inference DSP
CONFIG_I2S=y
CONFIG_I2S_STM32_SAI=y
CONFIG_I2S_STM32_SAI_BLOCK_COUNT=18
CONFIG_DMA=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_BASICMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_MATRIX=y
CONFIG_CMSIS_DSP_FASTMATH=y

# Filesystem and SD card over SPI
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_DISK_ACCESS=y
CONFIG_SDHC=y
CONFIG_SPI=y

# LoRaWAN connectivity
CONFIG_LORA=y
CONFIG_LORAWAN=y
CONFIG_LORAWAN_REGION_EU868=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LORAWAN_NVM_SETTINGS=y

# RTC, low-power kernel support, and retention
CONFIG_RTC=y
CONFIG_RTC_STM32=y
CONFIG_RTC_ALARM=y
CONFIG_PM=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=y
CONFIG_HWINFO=y
CONFIG_RESET=y
CONFIG_CORTEX_M_SYSTICK=n
CONFIG_STM32_LPTIM_TIMER=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=4096
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y

# Watchdog and reboot
CONFIG_WATCHDOG=y
CONFIG_IWDG_STM32_INITIAL_TIMEOUT=26214
CONFIG_REBOOT=y

# Flash, NVS, and DFU storage
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_NVS_INIT_BAD_MEMORY_REGION=y
CONFIG_STREAM_FLASH=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# MCUboot image management and automatic signing artifacts
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_MCUBOOT_BOOTLOADER_MODE_OVERWRITE_ONLY=y
# CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE is not set
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="/home/usr_name/zephyrproject/keys/bird-mcuboot-ec256.pem"
CONFIG_MCUBOOT_BOOTUTIL_LIB=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.302+0"
