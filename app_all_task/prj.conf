# GPIO and LED Support
CONFIG_GPIO=y

# ADC Support for voltage monitoring
CONFIG_ADC=y
CONFIG_ADC_STM32=y

# I2C Support for sensors
CONFIG_I2C=y
CONFIG_I2C_STM32_BUS_RECOVERY=y
CONFIG_I2C_STM32_V2_TIMING=y

# Regulator support for peripheral power control
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# Sensor Support
CONFIG_SENSOR=y
# BME280 temperature, pressure, humidity sensor
# NOTE: BME280 PM suspend support is disabled in DTS (zephyr,pm-device-disabled)
# because the Bosch BME280 driver has issues with PM callbacks when I2C is under
# heavy contention during boot. Device remains functional; just no aggressive PM.
CONFIG_BME280=y
# INA3221 triple-channel power monitor
CONFIG_INA3221=y
# Not used by app logic; avoid boot-time voltage-divider init errors on board DTS nodes
CONFIG_VOLTAGE_DIVIDER=n

# Logging
CONFIG_LOG=y
# Defer log formatting/processing out of ISR context to reduce interrupt stack usage
CONFIG_LOG_MODE_DEFERRED=y
# CONFIG_LOG_MODE_MINIMAL is not set
# CONFIG_LOG_MODE_IMMEDIATE is not set
CONFIG_LOG_PRINTK=n
CONFIG_LOG_BUFFER_SIZE=16384
# Default log level at INFO to avoid init timing sensitivity to verbose debug logs
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=1000
CONFIG_PM_LOG_LEVEL_DBG=y

# Keep CPU in fault handler for debugging (don't auto-reset)
# Zephyr v4.3 has no CONFIG_RESET_ON_FATAL_ERROR symbol; default fatal handler halts.

# Console and Serial
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Filesystem and SD card over SPI (FATFS)
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_DISK_ACCESS=y
CONFIG_SDHC=y
# Use SDHC over SPI (not native SDMMC controller)
# CONFIG_SPI_SDHC will be auto-enabled by device tree when sdhc-spi-slot is present
CONFIG_SPI=y

# Increase main thread stack to avoid FS/printf stack exhaustion
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_IDLE_STACK_SIZE=512
CONFIG_ISR_STACK_SIZE=4096
CONFIG_ASSERT=n
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_SENTINEL=y


# Enable float formatting in logging/printf paths (optional but safer)
CONFIG_CBPRINTF_FP_SUPPORT=y

# Floating-point unit usage for MFCC on workqueue
# Allow FP instructions and save/restore FP context across threads
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# CMSIS-DSP library for FFT/MFCC
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_BASICMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_MATRIX=y
CONFIG_CMSIS_DSP_FASTMATH=y
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# I2S / SAI for microphone capture (STM32 SAI driver)
CONFIG_I2S=y
CONFIG_I2S_STM32_SAI=y
CONFIG_I2S_STM32_SAI_BLOCK_COUNT=18
CONFIG_DMA=y
CONFIG_HEAP_MEM_POOL_SIZE=4192

# LoRaWAN connectivity
CONFIG_LORA=y
CONFIG_LORAWAN=y
CONFIG_LORAWAN_REGION_EU868=y
# Increase system workqueue stack for LoRaWAN control traffic
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# RTC driver (calendar API).
# CONFIG_COUNTER_RTC_STM32 and RTC_STM32 both bind to the same DT node (st,stm32-rtc)
# with the same DT_DRV_COMPAT; enabling both causes a linker symbol conflict, and
# RTC_STM32 defaults to 'n' when COUNTER=y. Use RTC_STM32 exclusively.
CONFIG_RTC_STM32=y
CONFIG_POWEROFF=y
CONFIG_HWINFO=y
CONFIG_RTC=y
CONFIG_RTC_ALARM=y

# low-power kernel capabilities
CONFIG_PM=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_DEVICE=y
# Use STM32 LPTIM as low-power system timer source during STOP modes
CONFIG_CORTEX_M_SYSTICK=n
CONFIG_STM32_LPTIM_TIMER=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=4096
CONFIG_RETAINED_MEM=y
CONFIG_RETAINED_MEM_ZEPHYR_RAM=y
CONFIG_RETENTION=y

# Watchdog and reboot support
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=y
CONFIG_IWDG_STM32_INITIAL_TIMEOUT=26214
CONFIG_REBOOT=y

# feature switches (low-power rollout gates)
CONFIG_APP_LOW_POWER_FSM=y
CONFIG_APP_DEEP_SLEEP_ENABLE=y
CONFIG_APP_RETENTION_ENABLE=y
CONFIG_APP_DEEP_SLEEP_SIMULATE=n

# Wakeup source switches (support multiple enabled sources)
CONFIG_APP_WAKEUP_SRC_BUTTON=y
CONFIG_APP_WAKEUP_SRC_PERIODIC=y
CONFIG_APP_WAKEUP_SRC_COMM=y
CONFIG_APP_WAKEUP_SRC_RTC_ALARM=y
CONFIG_APP_WAKEUP_SRC_SOUND=n
CONFIG_APP_WAKEUP_SRC_LOW_BAT=y

# GPS local time offset from UTC in hours.
# France: winter = 1, summer (DST) = 2. Current deployment uses 2.
CONFIG_APP_GPS_LOCAL_TIME_OFFSET_HOURS=2

# thread analyzer for debugging and performance analysis
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=n
CONFIG_THREAD_NAME=n

# Optimize for size
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_LTO=y
CONFIG_CBPRINTF_REDUCED_INTEGRAL=y
CONFIG_PICOLIBC=y 

# Link application to chosen DTS code partition (slot0_partition)
CONFIG_USE_DT_CODE_PARTITION=y

# --- 启用 MCUboot 支持 ---
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_MCUBOOT_BOOTLOADER_MODE_OVERWRITE_ONLY=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_BOOTUTIL_LIB=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.302+0"

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_REBOOT=y
