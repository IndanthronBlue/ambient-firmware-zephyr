# Disable MCUboot's no-signature development mode
# CONFIG_BOOT_SIGNATURE_TYPE_NONE is not set

CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
CONFIG_BOOT_ECDSA_TINYCRYPT=y
CONFIG_BOOT_SIGNATURE_KEY_FILE="/home/usr_name/zephyrproject/keys/bird-mcuboot-ec256.pem"

# Validate primary slot on every boot
CONFIG_BOOT_VALIDATE_SLOT0=y

# Match current app_all_task overwrite-only DFU mode
CONFIG_BOOT_UPGRADE_ONLY=y
